<!DOCTYPE html>
<html>
<head>
<title>Tech Pioneers Banner</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: #e0e0e0; /* Just for visibility */
    padding: 20px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"; /* Mimics system font like in image */
  }
  .banner {
    width: 450px; /* Adjust width as needed */
    border-radius: 15px; /* Rounded corners */
    overflow: hidden; /* Ensures content respects rounded corners */
    box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Optional shadow */
  }
  .top-section {
    background-color: #3498db; /* Blue background */
    padding: 30px 20px;
    text-align: center;
    color: white;
  }
  .top-section h1 {
    font-size: 2em; /* Large heading */
    font-weight: bold;
    margin: 0 0 10px 0;
  }
  .top-section p {
    font-size: 1em; /* Smaller text */
    margin: 0;
    line-height: 1.4;
  }
  .bottom-section {
    background-color: #f0f0f0; /* Light grey background */
    padding: 20px;
    text-align: center;
    color: black;
  }
  .bottom-section p {
    font-size: 1.1em;
    margin: 0 0 10px 0; /* Space before emoji */
  }
  .bottom-section .emoji {
    font-size: 1.5em; /* Emoji size */
  }
</style>
</head>
<body>

<div class="banner">
  <div class="top-section">
    <h1>How well do you know tech pioneers?</h1>
    <p>Meet the people behind the screens—test your knowledge of the inventors and innovators who shaped our digital world!</p>
  </div>
  <div class="bottom-section">
    <p>Try it using the link below:</p>
    <div class="emoji">👇🏽</div>
  </div>
</div>

</body>
</html>
