<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holy Ghost Fire Prayer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0f0f23 70%, #000000 100%);
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .prayer-container {
            position: relative;
            width: 90vw;
            height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .holy-fire-circle {
            position: absolute;
            width: 600px;
            height: 600px;
            border: 4px solid transparent;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b35, #f7931e, #ffdc00, #ff6b35);
            background-size: 400% 400%;
            animation: fireGlow 3s ease-in-out infinite, rotate 20s linear infinite;
            filter: drop-shadow(0 0 30px rgba(255, 107, 53, 0.8));
        }
        
        .holy-fire-circle::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b35, #f7931e, #ffdc00, #ff6b35);
            background-size: 400% 400%;
            animation: fireGlow 3s ease-in-out infinite reverse;
            z-index: -1;
            filter: blur(8px);
        }
        
        .blood-overlay {
            position: absolute;
            width: 620px;
            height: 620px;
            border: 3px solid #8b0000;
            border-radius: 50%;
            animation: bloodPulse 4s ease-in-out infinite, rotateReverse 15s linear infinite;
            filter: drop-shadow(0 0 20px rgba(139, 0, 0, 0.6));
        }
        
        .blood-overlay::after {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border: 2px solid rgba(139, 0, 0, 0.3);
            border-radius: 50%;
            animation: bloodPulse 4s ease-in-out infinite 0.5s;
        }
        
        .flame-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .flame {
            position: absolute;
            width: 8px;
            height: 20px;
            background: linear-gradient(to top, #ff6b35, #ffdc00);
            border-radius: 50% 50% 0 0;
            animation: flicker 2s ease-in-out infinite;
        }
        
        .flame:nth-child(1) { top: 10%; left: 50%; animation-delay: 0s; }
        .flame:nth-child(2) { top: 25%; right: 15%; animation-delay: 0.5s; }
        .flame:nth-child(3) { bottom: 25%; left: 15%; animation-delay: 1s; }
        .flame:nth-child(4) { bottom: 10%; right: 50%; animation-delay: 1.5s; }
        .flame:nth-child(5) { top: 50%; left: 8%; animation-delay: 0.7s; }
        .flame:nth-child(6) { top: 50%; right: 8%; animation-delay: 1.2s; }
        
        .prayer-text {
            position: relative;
            z-index: 10;
            color: #ffffff;
            max-width: 80%;
            padding: 40px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: textGlow 4s ease-in-out infinite;
        }
        
        .prayer-text h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ffdc00, #ff6b35, #ffffff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleShine 3s ease-in-out infinite;
        }
        
        .prayer-text p {
            font-size: 1.4rem;
            font-weight: 400;
            line-height: 1.6;
            color: #f0f0f0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        
        .cross-symbol {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            color: #ffdc00;
            filter: drop-shadow(0 0 15px rgba(255, 220, 0, 0.8));
            animation: crossGlow 3s ease-in-out infinite;
        }
        
        @keyframes fireGlow {
            0%, 100% { background-position: 0% 50%; filter: drop-shadow(0 0 30px rgba(255, 107, 53, 0.8)); }
            25% { background-position: 100% 50%; filter: drop-shadow(0 0 40px rgba(247, 147, 30, 0.9)); }
            50% { background-position: 50% 100%; filter: drop-shadow(0 0 50px rgba(255, 220, 0, 1)); }
            75% { background-position: 0% 100%; filter: drop-shadow(0 0 40px rgba(255, 107, 53, 0.9)); }
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes rotateReverse {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }
        
        @keyframes bloodPulse {
            0%, 100% { 
                border-color: #8b0000;
                filter: drop-shadow(0 0 20px rgba(139, 0, 0, 0.6));
                transform: scale(1);
            }
            50% { 
                border-color: #cd5c5c;
                filter: drop-shadow(0 0 30px rgba(205, 92, 92, 0.8));
                transform: scale(1.02);
            }
        }
        
        @keyframes flicker {
            0%, 100% { 
                opacity: 0.8;
                transform: scale(1) rotate(-2deg);
            }
            25% { 
                opacity: 1;
                transform: scale(1.1) rotate(2deg);
            }
            50% { 
                opacity: 0.9;
                transform: scale(0.9) rotate(-1deg);
            }
            75% { 
                opacity: 1;
                transform: scale(1.05) rotate(1deg);
            }
        }
        
        @keyframes textGlow {
            0%, 100% { 
                background: rgba(0, 0, 0, 0.3);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            50% { 
                background: rgba(0, 0, 0, 0.4);
                border: 1px solid rgba(255, 220, 0, 0.3);
            }
        }
        
        @keyframes titleShine {
            0%, 100% { 
                background: linear-gradient(45deg, #ffdc00, #ff6b35, #ffffff);
                background-clip: text;
                -webkit-background-clip: text;
            }
            50% { 
                background: linear-gradient(45deg, #ffffff, #ffdc00, #ff6b35);
                background-clip: text;
                -webkit-background-clip: text;
            }
        }
        
        @keyframes crossGlow {
            0%, 100% { 
                color: #ffdc00;
                filter: drop-shadow(0 0 15px rgba(255, 220, 0, 0.8));
                transform: translateX(-50%) scale(1);
            }
            50% { 
                color: #ffffff;
                filter: drop-shadow(0 0 25px rgba(255, 255, 255, 1));
                transform: translateX(-50%) scale(1.1);
            }
        }
        
        @media (max-width: 768px) {
            .holy-fire-circle {
                width: 400px;
                height: 400px;
            }
            
            .blood-overlay {
                width: 420px;
                height: 420px;
            }
            
            .prayer-text h1 {
                font-size: 1.8rem;
            }
            
            .prayer-text p {
                font-size: 1.1rem;
            }
            
            .cross-symbol {
                font-size: 2rem;
            }
        }
        
        @media (max-width: 480px) {
            .holy-fire-circle {
                width: 300px;
                height: 300px;
            }
            
            .blood-overlay {
                width: 320px;
                height: 320px;
            }
            
            .prayer-text h1 {
                font-size: 1.4rem;
            }
            
            .prayer-text p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="prayer-container">
        <div class="holy-fire-circle"></div>
        <div class="blood-overlay"></div>
        
        <div class="flame-particles">
            <div class="flame"></div>
            <div class="flame"></div>
            <div class="flame"></div>
            <div class="flame"></div>
            <div class="flame"></div>
            <div class="flame"></div>
        </div>
        
        <div class="prayer-text">
            <div class="cross-symbol">✝</div>
            <h1>Prayer Declaration</h1>
            <p>I draw a big circle of Holy Ghost Fire<br>with the blood of Jesus</p>
        </div>
    </div>
</body>
</html>
